<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardiões da Galáxia - Galeria</title>
    <style>
        /* Declaração da fonte personalizada */
        @font-face {
            font-family: 'GuardiansFont';
            src: url('fonts/sf-distant-galaxy.woff') format('woff');
        }

        body {
            font-family: 'GuardiansFont', Arial, sans-serif;
            /* Gradiente animado com movimento */
            background: linear-gradient(135deg, #6a1f94, #000000, #b300d9);
            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
            color: #fff;
            margin: 0;
        }

        /* Animação do gradiente */
        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-family: 'GuardiansFont', 'Comic Sans MS', cursive, sans-serif;
            color: #ffcc00;
            font-size: 3rem;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        nav ul li {
            margin: 0;
        }

        nav ul li a {
            background-color: #ffcc00;
            color: #800080;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1rem;
            transition: background-color 0.3s, color 0.3s;
            display: inline-block;
            text-align: center;
            font-family: 'GuardiansFont', Arial, sans-serif;
        }

        nav ul li a:hover {
            background-color: #800080;
            color: #ffcc00;
        }

        .carousel {
            width: 80%;
            max-width: 1000px;
            overflow: hidden;
            position: relative;
            margin: 30px auto;
        }

        .carousel-images {
            display: flex;
            transition: transform 1s ease-in-out;
            gap: 10px;
        }

        .carousel-images img {
            width: 200px;
            height: auto;
            object-fit: cover;
        }

        footer {
            background: rgba(0, 0, 0, 0.7);
            text-align: center;
            padding: 20px;
        }

        footer p {
            margin: 0;
            font-family: 'GuardiansFont', Arial, sans-serif;
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            nav ul li {
                margin-right: 10px;
            }

            nav ul {
                gap: 8px;
            }

            nav ul li a {
                font-size: 1rem;
                padding: 8px 16px;
            }

            .carousel {
                width: 90%;
            }

            .carousel-images img {
                width: 150px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }

            nav ul li {
                margin-right: 5px;
            }

            nav ul {
                flex-direction: column;
                gap: 5px;
            }

            nav ul li a {
                font-size: 0.9rem;
                padding: 6px 12px;
                width: 90%;
                margin: 0 auto;
            }

            .carousel {
                width: 100%;
            }

            .carousel-images img {
                width: 120px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Guardiões da Galáxia</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="filmes.html">Filmes</a></li>
                <li><a href="galeria.html">Galeria</a></li>
                <li><a href="personagens.html">Personagens</a></li>
            </ul>
        </nav>
    </header>

    <section class="carousel">
        <div class="carousel-images">
            <img src="Galeria 1.jpg" alt="Groot">
            <img src="galeria 2.jpg" alt="Rocket Raccoon">
            <img src="galeria 3.jpg" alt="Star-Lord">
            <img src="Fundo.jpeg" alt="Guardiões">
            <img src="fundo 2.jpeg" alt="Guardiões">
            <img src="fundo3.jpg" alt="Guardiões">
            <img src="Galeria 1.jpg" alt="Groot">
            <img src="galeria 2.jpg" alt="Rocket Raccoon">
            <img src="galeria 3.jpg" alt="Star-Lord">
            <img src="Fundo.jpeg" alt="Guardiões">
            <img src="fundo 2.jpeg" alt="Guardiões">
            <img src="fundo3.jpg" alt="Guardiões">
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Guardiões da Galáxia - Todos os direitos reservados</p>
    </footer>

    <script>
        let currentIndex = 0;
        const carousel = document.querySelector('.carousel-images');
        const totalImages = carousel.children.length;

        function moveCarousel() {
            currentIndex = (currentIndex + 1) % totalImages;
            carousel.style.transform = `translateX(-${currentIndex * (200 + 10)}px)`;
        }

        setInterval(moveCarousel, 3000);
    </script>
</body>
</html>
