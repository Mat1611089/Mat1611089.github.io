<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardiões da Galáxia</title>
    <style>
        /* Declaração da fonte personalizada */
        @font-face {
            font-family: 'GuardiansFont';
            src: url('fonts/sf-distant-galaxy.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'GuardiansFont', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #6a1f94, #000000, #003366);
            color: #fff;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: #ffcc00;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        nav ul li {
            margin: 0;
        }

        nav ul li a {
            background-color: #ffcc00;
            color: #800080;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1rem;
            transition: background-color 0.3s, color 0.3s;
            display: inline-block;
        }

        nav ul li a:hover {
            background-color: #800080;
            color: #ffcc00;
        }

        main {
            padding: 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h2 {
            font-size: 2rem;
            color: #ffcc00;
        }

        .hero p {
            font-size: 1.2rem;
        }

        .characters {
            text-align: center;
        }

        .characters .character img {
            width: 70%;
            max-width: 500px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        footer {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        footer p {
            margin: 0;
        }

        /* Media Queries para telas menores */
        @media (max-width: 768px) {
            nav ul li a {
                font-size: 1rem;
                padding: 8px 16px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.6rem;
            }

            nav ul li a {
                font-size: 0.9rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>Guardiões da Galáxia</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="personagens.html">Personagens</a></li>
                <li><a href="filmes.html">Filmes</a></li>
                <li><a href="galeria.html">Galeria</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Embarque na Aventura Espacial!</h2>
            <p>Junte-se aos Guardiões para salvar a galáxia!</p>
        </section>

        <section class="characters">
            <div class="character-row">
                <div class="character">
                    <img src="Design sem nome (2).png" alt="Imagem dos Guardiões da Galáxia">
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Guardiões da Galáxia - Todos os direitos reservados</p>
    </footer>
</body>
</html>
