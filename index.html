<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardiões da Galáxia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #6a1f94, #000000, #003366);
            color: #fff;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: #ffcc00;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin-right: 20px;
        }

        nav ul li a {
            background-color: #ffcc00;
            color: #800080; /* Cor roxa para o texto */
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1rem;
            transition: background-color 0.3s, color 0.3s;
        }

        nav ul li a:hover {
            background-color: #800080; /* Cor roxa para o fundo */
            color: #ffcc00; /* Cor amarela para o texto */
        }

        main {
            padding: 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h2 {
            font-size: 2rem;
            color: #ffcc00;
        }

        .hero p {
            font-size: 1.2rem;
        }

        .characters {
            text-align: center;
        }

        .characters h2 {
            font-size: 2rem;
            color: #ffcc00;
            margin-bottom: 20px;
        }

        .character-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap; /* Permite que os itens quebrem para a linha inferior em telas menores */
        }

        .character {
            text-align: center;
            flex: 1 1 200px; /* Permite que as imagens se ajustem conforme a tela */
            max-width: 250px; /* Define uma largura máxima para as imagens */
            margin-bottom: 20px;
        }

        .character img {
            width: 100%; /* Faz com que as imagens ocupem toda a largura do container */
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .character p {
            margin-top: 10px;
            font-size: 1.2rem;
        }

        footer {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        footer p {
            margin: 0;
        }

        /* Media Queries para telas menores */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem; /* Reduz o tamanho do título */
            }

            nav ul li {
                margin-right: 10px; /* Reduz o espaçamento entre os links de navegação */
            }

            .hero h2 {
                font-size: 1.8rem; /* Ajusta o tamanho do subtítulo */
            }

            .hero p {
                font-size: 1rem; /* Ajusta o tamanho do texto */
            }

            .characters h2 {
                font-size: 1.8rem; /* Ajusta o tamanho do título da seção */
            }

            .character-row {
                flex-direction: column; /* Organiza os personagens em coluna */
                gap: 10px; /* Reduz o espaçamento entre as imagens */
            }

            .character {
                flex: 1 1 100%; /* Faz com que as imagens ocupem toda a largura disponível */
                max-width: none; /* Remove a largura máxima */
            }

            .character img {
                width: 80%; /* Ajusta o tamanho das imagens em telas pequenas */
                max-width: 200px; /* Limita o tamanho das imagens */
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.6rem; /* Diminui ainda mais o título em telas muito pequenas */
            }

            nav ul li {
                margin-right: 5px; /* Reduz o espaçamento entre os links */
            }

            .hero h2 {
                font-size: 1.5rem; /* Ajusta o tamanho do subtítulo */
            }

            .hero p {
                font-size: 1rem; /* Ajusta o tamanho do texto */
            }

            .characters h2 {
                font-size: 1.5rem; /* Ajusta o tamanho do título da seção */
            }

            .character img {
                width: 100%; /* Ajusta as imagens para ocupar 100% da largura em telas muito pequenas */
                max-width: 180px; /* Limita a largura das imagens */
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>Guardiões da Galáxia</h1>
        </div>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="personagens.html">Personagens</a></li>
                <li><a href="filmes.html">Filmes</a></li>
                <li><a href="galeria.html">Galeria</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Embarque na Aventura Espacial!</h2>
            <p>Junte-se aos Guardiões para salvar a galáxia!</p>
        </section>

        <section class="characters">
            <h2>Personagens</h2>
            <div class="character-row">
                <div class="character">
                    <img src="rocket.png" alt="Rocket Raccoon">
                    <p>Rocket Raccoon</p>
                </div>
                <div class="character">
                    <img src="groot.jpg" alt="Groot">
                    <p>Groot</p>
                </div>
                <div class="character">
                    <img src="Star-Lord_AIW_Profile.webp" alt="Star-Lord">
                    <p>Star-Lord</p>
                </div>
            </div>
            <div class="character-row">
                <div class="character">
                    <img src="Gamora.jpg" alt="Gamora">
                    <p>Gamora</p>
                </div>
                <div class="character">
                    <img src="Drax.jpg" alt="Drax">
                    <p>Drax</p>
                </div>
                <div class="character">
                    <img src="Mantis.jpg" alt="Mantis">
                    <p>Mantis</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Guardiões da Galáxia - Todos os direitos reservados</p>
    </footer>
</body>
</html>
